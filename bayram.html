<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurban Bayramınız Mübarek Olsun 🌙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #FFD700;
      --gold-light: #FFF0A0;
      --bg-deep: #030a16;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: 'Cinzel Decorative', serif;
    }
    #loader {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0a1628 0%, #020814 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-crescent {
      font-size: 70px; color: var(--gold); display: block;
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.8));
      animation: crescentSpin 3s linear infinite;
    }
    @keyframes crescentSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }
    #three-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; }
    #ui-overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; overflow: hidden; }
    #bg-title {
      position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
      text-align: center; opacity: 0; z-index: 5; transition: opacity 1.5s ease; white-space: nowrap;
    }
    #bg-title.visible { opacity: 1; }
    #bg-title .line1 {
      display: block; font-size: clamp(11px, 1.4vw, 22px);
      letter-spacing: 0.25em; color: rgba(255, 220, 140, 0.45);
      text-shadow: 0 0 12px rgba(255,200,80,0.2);
    }
    #bg-title .line2 {
      display: block; font-family: 'Amiri', serif; font-size: clamp(9px, 1vw, 16px);
      letter-spacing: 0.3em; color: rgba(255, 200, 100, 0.25); margin-top: 6px;
    }
    #star-field { position: absolute; inset: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: starTwinkle var(--dur) ease-in-out var(--delay) infinite; }
    @keyframes starTwinkle {
      0%,100% { opacity: var(--base-op); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.6); }
    }
    #explosion-text {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      z-index: 100; text-align: center; opacity: 0;
    }
    #explosion-text.show { animation: explodeTextReveal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    #explosion-text .main-msg {
      font-size: clamp(20px, 3.5vw, 54px); font-weight: 900;
      background: linear-gradient(135deg, #FFD700 0%, #FFF8B0 40%, #FFD700 70%, #d4af37 100%);
      background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 22px rgba(255,215,0,0.6)); animation: goldShimmer 2.5s ease infinite 1.2s;
      letter-spacing: 0.08em; white-space: nowrap;
    }
    #explosion-text .sub-msg { display: block; font-family: 'Amiri', serif; font-size: clamp(14px, 1.8vw, 26px); color: rgba(255,235,170,0.9); letter-spacing: 0.15em; margin-top: 14px; }
    #explosion-text.fade-out { animation: explodeTextFade 1s ease forwards; }
    @keyframes explodeTextReveal {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(0) rotate(-10deg); }
      60% { opacity: 1; transform: translate(-50%,-50%) scale(1.1) rotate(2deg); }
      100% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    }
    @keyframes explodeTextFade { 0% { opacity: 1; transform: translate(-50%,-50%) scale(1); } 100% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } }
    @keyframes goldShimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    .candy-burst-particle { position: fixed; border-radius: 50%; z-index: 80; animation: candyBurstAnim var(--dur) ease-out var(--delay) forwards; }
    @keyframes candyBurstAnim { 0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx),var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; } }
    
    .candy-star { position: fixed; z-index: 80; font-size: var(--size); animation: starBurstAnim var(--dur) ease-out var(--delay) forwards; }
    @keyframes starBurstAnim {
      0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
      25% { transform: translate(calc(var(--tx)*0.3),calc(var(--ty)*0.3)) scale(1.2) rotate(90deg); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
    }
    .glow-ring { position: fixed; border-radius: 50%; z-index: 79; border: 2px solid var(--color); animation: glowRingAnim var(--dur) ease-out var(--delay) forwards; }
    @keyframes glowRingAnim { 0% { transform: translate(-50%,-50%) scale(0); opacity: 1; box-shadow: 0 0 30px var(--color); } 100% { transform: translate(-50%,-50%) scale(6); opacity: 0; } }
    
    #float-emojis { position: absolute; inset: 0; overflow: hidden; }
    .float-emoji { position: absolute; font-size: 32px; opacity: 0; animation: floatUp var(--dur) ease-out var(--delay) infinite; }
    @keyframes floatUp {
      0% { transform: translateY(110vh) translateX(0) rotate(0deg) scale(0); opacity: 0; }
      8% { opacity: 0.6; transform: translateY(85vh) translateX(var(--drift)) rotate(20deg) scale(1); }
      90% { opacity: 0.3; transform: translateY(-15vh) translateX(calc(var(--drift)*3)) rotate(340deg) scale(0.7); }
      100% { opacity: 0; transform: translateY(-25vh) translateX(calc(var(--drift)*3.5)) rotate(380deg) scale(0); }
    }
    @media (max-width: 600px) { #explosion-text .main-msg { font-size: 22px; white-space: normal; } }
  </style>
</head>
<body>

  <div id="loader"><div class="loader-inner"><span class="loader-crescent">☪</span></div></div>
  <canvas id="three-canvas"></canvas>

  <div id="ui-overlay">
    <div id="star-field"></div>
    <div id="bg-title">
      <span class="line1">✦ &nbsp; K U R B A N &nbsp; B A Y R A M I &nbsp; ✦</span>
      <span class="line2">☪ &nbsp; Mübarek Olsun &nbsp; ☪</span>
    </div>
    <div id="float-emojis"></div>
    <div id="explosion-text">
      <span class="main-msg">Kurban Bayramınız Kutlu Olsun</span>
      <span class="sub-msg">🌙 Bereket, Huzur ve Sağlık Getirmesi Dileğiyle 🤲</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const rand = (a, b) => Math.random() * (b - a) + a;
    const randInt = (a, b) => Math.floor(rand(a, b));
    const TAU = Math.PI * 2;

    const GROW_DURATION = 2.5;  
    const HOLD_DURATION = 1.2;  
    const RESET_DELAY = 4000;  

    function buildStarField() {
      const sf = $('star-field');
      for (let i = 0; i < 160; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = rand(1, 3);
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${rand(0,100)}%;top:${rand(0,100)}%;--dur:${rand(3,8)}s;--delay:${rand(0,7)}s;--base-op:${rand(0.25,0.7)};`;
        sf.appendChild(s);
      }
    }

    const canvas = $('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030a16, 0.015);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 0, 24);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x1a2a4a, 0.8));
    const keyLight = new THREE.DirectionalLight(0xFFE8B0, 3.0);
    keyLight.position.set(5, 8, 10);
    scene.add(keyLight);

    const goldPt = new THREE.PointLight(0xFFD700, 5, 40);
    goldPt.position.set(0, 0, 5);
    scene.add(goldPt);

    // Arka plan kozmik tozlar
    (function makeDust() {
      const geo = new THREE.BufferGeometry();
      const count = 600;
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        pos[i*3] = rand(-50, 50);
        pos[i*3+1] = rand(-30, 30);
        pos[i*3+2] = rand(-40, 0);
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const pts = new THREE.Points(geo, new THREE.PointsMaterial({
        color: 0x00FFCC, size: 0.09, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false
      }));
      scene.add(pts);
      window._dustPts = pts;
    })();

    /* ============================================================
       BAYRAMA ÖZEL 3D MODEL: HİLAL VE YILDIZ (Procedural THREE.JS)
    ============================================================ */
    const bayramGroup = new THREE.Group();
    scene.add(bayramGroup);
    bayramGroup.scale.setScalar(0);

    // CSG alternatifi: Akıllıca iç içe geçmiş küre kesişimi ile parlak 3D Hilal yapımı
    const crescentGroup = new THREE.Group();
    const moonMat = new THREE.MeshPhysicalMaterial({
      color: 0xFFD700, metalness: 0.9, roughness: 0.15,
      clearcoat: 1.0, clearcoatRoughness: 0.1,
      emissive: 0x3a2a00, side: THREE.DoubleSide
    });

    // Hilal formu için ana gövde şekli (Torus tabanlı zarif kesim)
    const crescentGeo = new THREE.TorusGeometry(3.5, 0.9, 32, 100, Math.PI * 1.1);
    const crescentMesh = new THREE.Mesh(crescentGeo, moonMat);
    crescentMesh.rotation.z = -Math.PI * 0.55;
    crescentGroup.add(crescentMesh);
    bayramGroup.add(crescentGroup);

    // Merkeze parıldayan 3D Bayram Yıldızı
    const starShape = new THREE.Shape();
    const points = 5;
    const outerRadius = 1.2;
    const innerRadius = 0.5;
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outerRadius : innerRadius;
      const currAng = (i / (points * 2)) * TAU - Math.PI/2;
      starShape.lineTo(Math.cos(currAng) * r, Math.sin(currAng) * r);
    }
    const starExtrudeSettings = { depth: 0.3, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 };
    const starGeo = new THREE.ExtrudeGeometry(starShape, starExtrudeSettings);
    const starMat = new THREE.MeshPhysicalMaterial({
      color: 0xFFFFFF, metalness: 0.5, roughness: 0.05,
      emissive: 0xFFD700, emissiveIntensity: 1.5, clearcoat: 1.0
    });
    const starMesh = new THREE.Mesh(starGeo, starMat);
    starMesh.position.set(1.5, 0, 0); // Hilalin içine yerleşim
    bayramGroup.add(starMesh);

    // Parlama Efekti (Glow)
    const glowCv = document.createElement('canvas');
    glowCv.width = glowCv.height = 256;
    const gctx = glowCv.getContext('2d');
    const gg = gctx.createRadialGradient(128,128,0,128,128,128);
    gg.addColorStop(0, 'rgba(255,215,0,1)');
    gg.addColorStop(0.3, 'rgba(255,165,0,0.5)');
    gg.addColorStop(1, 'rgba(255,0,0,0)');
    gctx.fillStyle = gg; gctx.fillRect(0,0,256,256);
    const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(glowCv), blending: THREE.AdditiveBlending, depthWrite: false }));
    glowSprite.scale.set(18, 18, 1);
    starMesh.add(glowSprite);

    /* ============================================================
       3D PATLAMA PARÇACIKLARI
    ============================================================ */
    let fragments = [];
    const fragGroup = new THREE.Group();
    scene.add(fragGroup);

    function buildFragments() {
      fragGroup.clear(); fragments = [];
      const fColors = [0xFFD700, 0x00FFCC, 0x00F0FF, 0xFFFFFF, 0x99FF33];
      for (let i = 0; i < 90; i++) {
        const s = rand(0.15, 0.55);
        const geo = rand() > 0.5 ? new THREE.IcosahedronGeometry(s, 0) : new THREE.ConeGeometry(s, s*2, 4);
        const mat = new THREE.MeshPhysicalMaterial({
          color: fColors[randInt(0, fColors.length)], metalness: 0.5, roughness: 0.1,
          emissive: fColors[randInt(0, fColors.length)], emissiveIntensity: 0.8, transparent: true
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.scale.setScalar(0);
        fragGroup.add(mesh);

        const spd = rand(8, 24);
        const th = rand(0, TAU), ph = rand(0, Math.PI);
        fragments.push({
          mesh, mat,
          vx: spd * Math.sin(ph) * Math.cos(th),
          vy: spd * Math.sin(ph) * Math.sin(th),
          vz: spd * Math.cos(ph),
          rx: rand(-6,6), ry: rand(-6,6), rz: rand(-6,6),
          life: 0, maxLife: rand(1.5, 3.5), active: false
        });
      }
    }
    buildFragments();

    let rings = [];
    function spawnRings() {
      const rColors = [0xFFD700, 0x00FFCC, 0xFFFFFF];
      for (let i = 0; i < 4; i++) {
        const mat = new THREE.MeshBasicMaterial({ color: rColors[i % rColors.length], transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false });
        const mesh = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.05, 16, 100), mat);
        mesh.rotation.x = rand(0, Math.PI); mesh.rotation.y = rand(0, Math.PI);
        scene.add(mesh);
        rings.push({ mesh, mat, t: 0, delay: i * 0.12, maxT: 2.0 });
      }
    }

    /* ============================================================
       CSS BAYRAM BURST (Kurbanlık Emojileri ve Kıvılcımlar)
    ============================================================ */
    function cssBurst(cx, cy) {
      const bayramEmojis = ['🐑', '🐏', '🌙', '☪️', '✨', '⭐', '🤲', '🕌', '🎉', '🎊', '🕋'];
      const colors = ['#FFD700', '#00FFCC', '#FFFFFF', '#FF33aa', '#33FF00'];

      for (let i = 0; i < 65; i++) {
        const el = document.createElement('div');
        el.className = 'candy-burst-particle';
        const size = rand(6, 22);
        const angle = rand(0, TAU);
        const dist = rand(100, 500);
        const dur = rand(1.0, 2.5);
        const delay = rand(0, 0.4);
        el.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[randInt(0,colors.length)]};box-shadow:0 0 ${size}px ${colors[randInt(0,colors.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${dur}s;--delay:${delay}s;--rot:${rand(360,900)}deg;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur+delay)*1000+200);
      }

      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'candy-star';
        el.textContent = bayramEmojis[randInt(0, bayramEmojis.length)];
        const angle = rand(0, TAU);
        const dist = rand(80, 450);
        const dur = rand(1.2, 2.8);
        const delay = rand(0, 0.5);
        el.style.cssText = `left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${dur}s;--delay:${delay}s;--rot:${rand(-720,720)}deg;--size:${rand(24,60)}px;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur+delay)*1000+200);
      }

      for (let i = 0; i < 5; i++) {
        const el = document.createElement('div');
        el.className = 'glow-ring';
        el.style.cssText = `left:${cx}px;top:${cy}px;width:50px;height:50px;--color:${colors[randInt(0,colors.length)]};--dur:1.4s;--delay:${i*0.15}s;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1800);
      }
    }

    function startFloatingEmojis() {
      const container = $('float-emojis');
      const items = ['☪','🌙','✨','🤲','🐑','🐏','🕌','🕋','🌟'];
      for (let i = 0; i < 16; i++) {
        const el = document.createElement('div');
        el.className = 'float-emoji';
        el.textContent = items[i % items.length];
        const dur = rand(10, 20);
        const delay = rand(0, 15);
        const left = rand(2, 95);
        const drift = rand(-80, 80);
        el.style.cssText = `left:${left}%;--dur:${dur}s;--delay:${delay}s;--drift:${drift}px;`;
        container.appendChild(el);
      }
    }

    /* ============================================================
       ANIMASYON DÖNGÜSÜ VE FAZ KONTROLLERİ
    ============================================================ */
    let cycleRunning = false;
    let elapsedTotal = 0;
    let growProgress = 0;
    let holdProgress = 0;
    let phase = 'idle';
    let exploded = false;

    function startCycle() {
      cycleRunning = true;
      phase = 'growing';
      exploded = false;
      growProgress = 0;
      holdProgress = 0;
      bayramGroup.position.set(0, 0, 0);
      bayramGroup.scale.setScalar(0);
      bayramGroup.rotation.set(0, 0, 0);

      fragments.forEach(f => { f.life = 0; f.active = false; f.mesh.scale.setScalar(0); });
      rings.forEach(r => { scene.remove(r.mesh); });
      rings = [];

      const eTxt = $('explosion-text');
      eTxt.classList.remove('show', 'fade-out');
      eTxt.style.opacity = '0';
    }

    function triggerExplosion() {
      if (exploded) return;
      exploded = true;
      phase = 'exploding';

      cssBurst(window.innerWidth/2, window.innerHeight/2);
      spawnRings();
      fragments.forEach(f => { f.active = true; f.mesh.scale.setScalar(1); });

      gsap.to(bayramGroup.scale, { x: 1.7, y: 1.7, z: 1.7, duration: 0.2, onComplete: () => {
        gsap.to(bayramGroup.scale, { x: 0, y: 0, z: 0, duration: 0.25 });
      }});

      gsap.to(goldPt, { intensity: 35, duration: 0.1, yoyo: true, repeat: 5 });

      const tl = gsap.timeline();
      for (let i = 0; i < 10; i++) {
        tl.to(camera.position, { x: rand(-0.6,0.6), y: rand(-0.4,0.4), duration: 0.06 });
      }
      tl.to(camera.position, { x: 0, y: 0, duration: 0.5 });

      setTimeout(() => { $('explosion-text').classList.add('show'); }, 400);

      setTimeout(() => {
        $('explosion-text').classList.add('fade-out');
        setTimeout(() => startCycle(), 1200);
      }, RESET_DELAY);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      elapsedTotal += dt;

      if (window._dustPts) {
        window._dustPts.rotation.y += dt * 0.02;
        window._dustPts.rotation.x += dt * 0.005;
      }

      starMesh.rotation.z -= dt * 0.8; // Yıldız kendi ekseninde döner

      if (phase === 'growing') {
        growProgress += dt / GROW_DURATION;
        if (growProgress >= 1) { growProgress = 1; phase = 'holding'; }

        const t = growProgress < 0.5 ? 4 * growProgress * growProgress * growProgress : 1 - Math.pow(-2 * growProgress + 2, 3) / 2;
        bayramGroup.scale.setScalar(t * 1.2);
        bayramGroup.rotation.y += dt * (0.2 + t * 0.6);
        bayramGroup.position.y = Math.sin(elapsedTotal * 2) * 0.3;
      }

      if (phase === 'holding') {
        holdProgress += dt / HOLD_DURATION;
        const strain = 1.2 + holdProgress * 0.3;
        const shakeAmt = holdProgress * 0.15;
        const shake = Math.sin(elapsedTotal * 32) * shakeAmt;
        
        bayramGroup.scale.setScalar(strain + Math.abs(shake) * 0.05);
        bayramGroup.position.x = shake;
        bayramGroup.rotation.y += dt * (0.8 + holdProgress * 4);

        if (holdProgress >= 1) triggerExplosion();
      }

      fragments.forEach(f => {
        if (!f.active) return;
        f.life += dt;
        if (f.life > f.maxLife) { f.active = false; f.mesh.scale.setScalar(0); return; }
        const t = f.life / f.maxLife;
        f.mesh.position.x += f.vx * dt * (1 - t * 0.3);
        f.mesh.position.y += (f.vy - 9.8 * f.life) * dt;
        f.mesh.position.z += f.vz * dt * (1 - t * 0.3);
        f.mesh.rotation.x += f.rx * dt;
        f.mesh.rotation.y += f.ry * dt;
        const sc = Math.max(0, 1 - t);
        f.mesh.scale.setScalar(sc);
        f.mat.opacity = sc;
      });

      rings.forEach(r => {
        r.t += dt;
        const lt = Math.max(0, r.t - r.delay) / r.maxT;
        if (lt >= 1) return;
        r.mesh.scale.setScalar(lt * 25);
        r.mat.opacity = Math.max(0, 1 - lt);
      });

      renderer.render(scene, camera);
    }

    window.addEventListener('load', () => {
      buildStarField();
      startFloatingEmojis();
      animate();
      setTimeout(() => { $('bg-title').classList.add('visible'); }, 600);
      setTimeout(() => {
        $('loader').classList.add('hidden');
        setTimeout(() => startCycle(), 400);
      }, 1400);
    });
  </script>
</body>
</html>
